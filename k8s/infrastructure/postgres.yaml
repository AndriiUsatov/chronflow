apiVersion: v1
kind: Service
metadata:
  name: chronflow-db-service
  namespace: chronflow
spec:
  type: ClusterIP
  clusterIP: None
  selector:
    app: postgres
  ports:
    - port: 5432

---

apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: chronflow
spec:
  serviceName: "chronflow-db-service"
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
      - name: postgres
        image: postgres:17-alpine
        env:
        - name: POSTGRES_DB
          valueFrom:
            configMapKeyRef:
              name: chronflow-postgres-config
              key: CHRONFLOW_PG_TASK_DB
        - name: POSTGRES_USER
          valueFrom:
            secretKeyRef:
              name: chronflow-postgres-creds
              key: CHRONFLOW_PG_USER
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: chronflow-postgres-creds
              key: CHRONFLOW_PG_PWD
        ports:
        - containerPort: 5432
        volumeMounts:
        - name: postgres-data
          mountPath: /var/lib/postgresql/data
        - name: init-scripts
          mountPath: /docker-entrypoint-initdb.d
      volumes:
      - name: init-scripts
        configMap:
          name: postgres-init-script
  volumeClaimTemplates:
  - metadata:
      name: postgres-data
    spec:
      accessModes: [ "ReadWriteOnce" ]
      resources:
        requests:
          storage: 1Gi