apiVersion: v1
kind: ConfigMap
metadata:
  name: chronflow-postgres-config
  namespace: chronflow
data:
  CHRONFLOW_PG_URI: chronflow-db-service
  CHRONFLOW_PG_PORT: "5432"
  CHRONFLOW_PG_TASK_DB: chronflow
  CHRONFLOW_PG_SSL_MODE: disable
  CHRONFLOW_PG_TASK_SCHEMA: chronflow
  CHRONFLOW_PG_TASK_TABLE: task
  CHRONFLOW_PG_NOTIFICATION_EVENT: new_task_event

--- 

apiVersion: v1
kind: ConfigMap
metadata:
  name: chronflow-grpc-config
  namespace: chronflow
data:
  CHRONFLOW_GRPC_TASK_UPDATE_SERVER_TRANSP: tcp
  # CHRONFLOW_GRPC_TASK_UPDATE_SERVER_URL: chronflow-api-grpc-service
  CHRONFLOW_GRPC_TASK_UPDATE_SERVER_URL: dns:///chronflow-api-grpc-service.chronflow.svc.cluster.local
  CHRONFLOW_GRPC_TASK_UPDATE_SERVER_PORT: "50051"

--- 

apiVersion: v1
kind: ConfigMap
metadata:
  name: chronflow-nats-config
  namespace: chronflow
data:
  CHRONFLOW_NATS_URL: nats://nats.chronflow.svc.cluster.local:4222
  CHRONFLOW_NATS_TASK_STREAM: TASKS
  CHRONFLOW_NATS_TASK_TO_PROCESS_SUBJECT: tasks.process
  CHRONFLOW_NATS_TASK_TO_PROCESS_DURABLE: TASK_CONS

---

apiVersion: v1
kind: ConfigMap
metadata:
  name: chronflow-api-config
  namespace: chronflow
data:
  CHRONFLOW_TASK_API_PORT: "8080"
