syntax = "proto3";

option go_package = "github.com/AndriiUsatov/chronflow/internal/pb";

service TaskService {
    rpc UpdateTaskStatus(UpdateTaskStatusRequest) returns (UpdateTaskStatusResponse);
}

enum Status {
    PENDING = 0;
    SCHEDULED = 1;
    COMPLETED = 2;
    FAILED = 3;
}

message UpdateTaskStatusRequest {
    string id = 1;
    Status status = 2;
    string error_message = 3;
}

message UpdateTaskStatusResponse {
    bool success = 1;
}